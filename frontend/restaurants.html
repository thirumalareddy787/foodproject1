<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurants</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>

    <h1>Create Restaurant</h1>

    <form id="restaurantForm" action="#" method="post" onsubmit="return false;">
        <div>
            <label for="name">Name</label>
            <input type="text" id="name" required>
        </div>
        <div>
            <label for="opening_time">Opening Time</label>
            <input type="time" id="opening_time" required>
        </div>
        <div>
            <label for="closing_time">Closing Time</label>
            <input type="time" id="closing_time" required>
        </div>
        <div>
            <label for="location">Location</label>
            <input type="text" id="location" required>
        </div>
        <div>
            <label for="rating">Rating</label>
            <input type="number" id="rating" min="0" max="5" step="0.1" required>
        </div>
        <button type="submit">Add Restaurant</button>
        <div id="restaurantMessage"></div>
    </form>

    <h1>Restaurants Data</h1>

    <table>
        <thead>
            <tr>
                <th>Restaurant ID</th>
                <th>Name</th>
                <th>Opening Time</th>
                <th>Closing Time</th>
                <th>Location</th>
                <th>Rating</th>
            </tr>
        </thead>

        <tbody id="restaurantData"></tbody>
    </table>

    <script src="./js/restaurants.js"></script>

</body>
</html>
